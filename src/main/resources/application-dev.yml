# 本地开发环境配置
# 使用方式: spring.profiles.active=local

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/article_generator?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: ArticleGeneratorPool
      max-lifetime: 1800000
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT配置
jwt:
  secret: article-generator-jwt-secret-key-very-long-string-for-security-2024-local
  expiration: 86400000

# 定时任务配置
schedule:
  cron: "0 0 6 * * ?"
  enabled: true

# 智谱AI配置
zhipu:
  api-key: you key
  api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
  model: glm-4-flash

# 文件上传配置
file:
  upload:
    path: ./uploads/
